# Production stack for helio-platform.
#
# Public surface:
#   - edge-nginx  :80 → the only container with a published port.
#
# Everything else (main-app SPA, heliogram SPA + Django, agent APIs, Postgres)
# is reachable only inside the internal docker network. This enforces
# "all traffic through nginx" at the network layer, not just by convention.
#
# Usage:
#   cp .env.prod.example .env.prod
#   # fill in SECRET_KEY, DJANGO_SUPERUSER_*, OPENROUTER_API_KEY, REPLICATE_API_TOKEN, ...
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# The dev stack lives in docker-compose.yml and is not affected by this file.

name: helio-platform-prod

x-default-restart: &default-restart
  restart: unless-stopped

x-agent-env: &agent-env
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  REPLICATE_API_TOKEN: ${REPLICATE_API_TOKEN:-}
  REPLICATE_IMAGE_MODEL: ${REPLICATE_IMAGE_MODEL:-bytedance/seedream-4.5}
  REPLICATE_VIDEO_MODEL: ${REPLICATE_VIDEO_MODEL:-kwaivgi/kling-v2.5-turbo-pro}
  IMAGE_PROMPT_LLM_MODEL: ${IMAGE_PROMPT_LLM_MODEL:-openai/gpt-4o}
  VIDEO_PROMPT_LLM_MODEL: ${VIDEO_PROMPT_LLM_MODEL:-openai/gpt-4o}
  STORYTELLER_LLM_MODEL: ${STORYTELLER_LLM_MODEL:-openai/gpt-4o}
  STORYTELLER_FALLBACK_MODELS: ${STORYTELLER_FALLBACK_MODELS:-}
  CAMPAIGN_MAKER_LLM_MODEL: ${CAMPAIGN_MAKER_LLM_MODEL:-openai/gpt-4o}
  CAMPAIGN_MAKER_FALLBACK_MODELS: ${CAMPAIGN_MAKER_FALLBACK_MODELS:-}
  FRONTEND_URL: ${PUBLIC_URL:-http://103.174.102.124}
  # External /v1/* API config. Each agent reads only its own key var, so an
  # operator can rotate (or disable) one agent's external surface without
  # touching the others. Per-agent overrides are set on the service blocks.
  HELIO_EXTERNAL_ALLOWED_ORIGINS: ${HELIO_EXTERNAL_ALLOWED_ORIGINS:-}
  HELIO_EXTERNAL_ALLOWED_ORIGIN_REGEX: ${HELIO_EXTERNAL_ALLOWED_ORIGIN_REGEX:-}
  HELIO_EXTERNAL_RATE_PER_MINUTE: ${HELIO_EXTERNAL_RATE_PER_MINUTE:-30}
  HELIO_EXTERNAL_RATE_BURST: ${HELIO_EXTERNAL_RATE_BURST:-10}

services:
  # ---------------------------------------------------------------- database
  db:
    image: postgres:16-alpine
    container_name: helio-prod-db
    <<: *default-restart
    environment:
      POSTGRES_DB: ${DB_NAME:-heliogram}
      POSTGRES_USER: ${DB_USER:-heliogram}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-heliogram}
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-heliogram} -d ${DB_NAME:-heliogram}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------- heliogram backend
  heliogram-backend:
    build:
      context: ./apps/heliogram
      dockerfile: backend/Dockerfile.prod
    container_name: helio-prod-heliogram-backend
    <<: *default-restart
    depends_on:
      db:
        condition: service_healthy
    environment:
      # --- Django core ---
      DJANGO_SETTINGS_MODULE: heliogram_core.settings
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY}
      # Defaults cover both the bare IP and the primary public domain so the
      # stack keeps working during DNS propagation. Override in .env.prod to
      # add / remove hosts without rebuilding.
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-103.174.102.124,api.helio.ae,localhost}
      ALLOW_LAN_DEV_ORIGINS: "False"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://103.174.102.124,http://api.helio.ae,https://api.helio.ae}
      # CSRF_TRUSTED_ORIGINS must include every full origin (scheme + host[:port])
      # that will POST to /admin/login/ or any other Django form endpoint. If
      # empty, settings.py falls back to an auto-derived list from CORS +
      # ALLOWED_HOSTS, which is usually enough for single-host HTTP deployments.
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://103.174.102.124,http://api.helio.ae,https://api.helio.ae}
      # Keep both of these False while the public URL is plain HTTP — otherwise
      # the browser refuses to store the session/CSRF cookies and admin login
      # fails with 403. Flip them to True the moment HTTPS is added in front.
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-False}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-False}
      # Canonical frontend URL used to build absolute links (password-reset
      # emails, etc.). Point it at whatever users type in the address bar.
      FRONTEND_URL: ${FRONTEND_URL:-http://api.helio.ae/heliogram}
      APP_NAME: ${APP_NAME:-HelioGram}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE:-en}
      # --- Database ---
      USE_SQLITE: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_NAME: ${DB_NAME:-heliogram}
      DB_USER: ${DB_USER:-heliogram}
      DB_PASSWORD: ${DB_PASSWORD:-heliogram}
      DB_HOST: db
      DB_PORT: 5432
      DB_CONN_MAX_AGE: ${DB_CONN_MAX_AGE:-60}
      # --- JWT ---
      JWT_ACCESS_TOKEN_LIFETIME: ${JWT_ACCESS_TOKEN_LIFETIME:-30}
      JWT_REFRESH_TOKEN_LIFETIME: ${JWT_REFRESH_TOKEN_LIFETIME:-10080}
      # --- Storage / uploads ---
      STORAGE_ROOT: /app/server/storage
      MAX_UPLOAD_SIZE: ${MAX_UPLOAD_SIZE:-52428800}
      # --- Superuser bootstrap (entrypoint.prod.sh consumes these) ---
      DJANGO_SUPERUSER_USERNAME: ${DJANGO_SUPERUSER_USERNAME}
      DJANGO_SUPERUSER_PASSWORD: ${DJANGO_SUPERUSER_PASSWORD}
      DJANGO_SUPERUSER_EMAIL: ${DJANGO_SUPERUSER_EMAIL}
      # --- Email (optional) ---
      EMAIL_BACKEND: ${EMAIL_BACKEND:-django.core.mail.backends.console.EmailBackend}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER:-}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD:-}
    volumes:
      - prod_heliogram_storage:/app/server/storage
      - prod_heliogram_media:/app/server/media
      - prod_heliogram_static:/app/server/staticfiles
    expose:
      - "8010"

  # ------------------------------------------------------- heliogram frontend
  heliogram-frontend:
    build:
      context: ./apps/heliogram
      dockerfile: frontend/Dockerfile.prod
      args:
        HELIOGRAM_BASE_PATH: /heliogram/
    container_name: helio-prod-heliogram-frontend
    <<: *default-restart
    depends_on:
      - heliogram-backend
    expose:
      - "80"

  # ---------------------------------------------------------------- main-app
  main-app-frontend:
    build:
      context: .
      dockerfile: apps/main-app/frontend/Dockerfile.prod
      # IMPORTANT: Keep these VITE_* defaults as **relative / same-origin**
      # paths. A production user might reach the app via several URLs:
      #   * http://103.174.102.124       (bare IP, during DNS propagation)
      #   * http://api.helio.ae     (canonical domain)
      #   * https://api.helio.ae    (once TLS is in front)
      # Baking an absolute URL into the bundle forces cross-origin calls for
      # two of the three cases. A relative base makes the browser call the
      # same host that served the bundle — nginx already routes
      # /api/{image,video,storyteller,campaign,*} to the right upstream.
      args:
        VITE_HELIOGRAM_API_BASE_URL: ${VITE_HELIOGRAM_API_BASE_URL:-/}
        VITE_IMAGE_AGENT_API_BASE_URL: ${VITE_IMAGE_AGENT_API_BASE_URL:-/api/image}
        VITE_VIDEO_AGENT_API_BASE_URL: ${VITE_VIDEO_AGENT_API_BASE_URL:-/api/video}
        VITE_STORYTELLER_AGENT_API_BASE_URL: ${VITE_STORYTELLER_AGENT_API_BASE_URL:-/api/storyteller}
        VITE_CAMPAIGN_MAKER_AGENT_API_BASE_URL: ${VITE_CAMPAIGN_MAKER_AGENT_API_BASE_URL:-/api/campaign}
        VITE_COMMUNITY_URL: ${VITE_COMMUNITY_URL:-/heliogram}
        VITE_OPENROUTER_API_KEY: ${VITE_OPENROUTER_API_KEY:-}
        VITE_OPENROUTER_MODEL: ${VITE_OPENROUTER_MODEL:-openai/gpt-4o}
        VITE_OPENROUTER_FALLBACK_MODELS: ${VITE_OPENROUTER_FALLBACK_MODELS:-}
    container_name: helio-prod-main-app
    <<: *default-restart
    expose:
      - "80"

  # ------------------------------------------------------------ agent APIs --
  image-generator-api:
    build:
      context: .
      dockerfile: agents/image-generator/backend/Dockerfile.prod
    container_name: helio-prod-image-generator
    <<: *default-restart
    environment:
      <<: *agent-env
      SERVICE_NAME: image-generator
      PORT: "8020"
      HELIO_EXTERNAL_API_KEYS_IMAGE: ${HELIO_EXTERNAL_API_KEYS_IMAGE:-}
    expose:
      - "8020"

  video-generator-api:
    build:
      context: .
      dockerfile: agents/video-generator/backend/Dockerfile.prod
    container_name: helio-prod-video-generator
    <<: *default-restart
    environment:
      <<: *agent-env
      SERVICE_NAME: video-generator
      PORT: "8030"
      HELIO_EXTERNAL_API_KEYS_VIDEO: ${HELIO_EXTERNAL_API_KEYS_VIDEO:-}
      # Video renders are expensive — override the shared rate-limit defaults.
      HELIO_EXTERNAL_RATE_PER_MINUTE: ${HELIO_EXTERNAL_VIDEO_RATE_PER_MINUTE:-10}
      HELIO_EXTERNAL_RATE_BURST: ${HELIO_EXTERNAL_VIDEO_RATE_BURST:-4}
    expose:
      - "8030"

  storyteller-api:
    build:
      context: .
      dockerfile: agents/storyteller/backend/Dockerfile.prod
    container_name: helio-prod-storyteller
    <<: *default-restart
    environment:
      <<: *agent-env
      SERVICE_NAME: storyteller
      PORT: "8040"
      HELIO_EXTERNAL_API_KEYS_STORYTELLER: ${HELIO_EXTERNAL_API_KEYS_STORYTELLER:-}
    expose:
      - "8040"

  campaign-maker-api:
    build:
      context: .
      dockerfile: agents/campaign-maker/backend/Dockerfile.prod
    container_name: helio-prod-campaign-maker
    <<: *default-restart
    environment:
      <<: *agent-env
      SERVICE_NAME: campaign-maker
      PORT: "8050"
      HELIO_EXTERNAL_API_KEYS_CAMPAIGN: ${HELIO_EXTERNAL_API_KEYS_CAMPAIGN:-}
    expose:
      - "8050"

  # -------------------------------------------------------- tenant-api --
  # Supabase-backed control plane: brand CRUD, member management, API-key
  # issuance, subdomain routing table. Holds the Supabase service-role key
  # — agents never see it. See services/tenant-api/README.md.
  tenant-api:
    build:
      context: .
      dockerfile: services/tenant-api/Dockerfile.prod
    container_name: helio-prod-tenant-api
    <<: *default-restart
    environment:
      SERVICE_NAME: tenant-api
      PORT: "8060"
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_JWKS_URL: ${SUPABASE_JWKS_URL}
      TENANT_API_ALLOWED_ORIGINS: ${TENANT_API_ALLOWED_ORIGINS:-}
      TENANT_API_ALLOWED_ORIGIN_REGEX: ${TENANT_API_ALLOWED_ORIGIN_REGEX:-}
    expose:
      - "8060"

  # ----------------------------------------------------------- edge nginx --
  edge-nginx:
    build:
      context: ./infra/nginx/prod
      dockerfile: Dockerfile
    container_name: helio-prod-nginx
    <<: *default-restart
    depends_on:
      - main-app-frontend
      - heliogram-frontend
      - heliogram-backend
      - image-generator-api
      - video-generator-api
      - storyteller-api
      - campaign-maker-api
      - tenant-api
    ports:
      - "${PUBLIC_HTTP_PORT:-80}:80"
      - "${PUBLIC_HTTPS_PORT:-443}:443"
    # Let's Encrypt artefacts live on the host (certbot runs there) and are
    # mounted read-only into the container. Missing on a fresh bootstrap?
    # Run the commands in DEPLOY.md §6b.3 Path B BEFORE the first `up`:
    # certbot will create the /etc/letsencrypt tree, and `mkdir -p
    # /var/www/certbot` covers the webroot.
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro

volumes:
  prod_postgres_data:
  prod_heliogram_storage:
  prod_heliogram_media:
  prod_heliogram_static:
