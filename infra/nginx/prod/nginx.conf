# Edge nginx for helio-platform (production, HTTP only, no TLS yet).
# This is the ONLY container on the public network. All other services are
# reachable via the internal docker network by hostname (main-app-frontend,
# heliogram-frontend, heliogram-backend, image-generator-api, etc.).
#
# Routing map (public URL → upstream):
#   /                           → main-app-frontend (SPA, marketing + agents UI)
#   /heliogram/                 → heliogram-frontend (Vite build with base=/heliogram/)
#   /api/realtime/events/       → heliogram-backend (SSE; buffering OFF)
#   /api/image/                 → image-generator-api       (rewritten to /api/)
#   /api/video/                 → video-generator-api       (rewritten to /api/)
#   /api/campaign/              → campaign-maker-api        (rewritten to /api/)
#   /api/storyteller/           → storyteller-api           (rewritten to /api/)
#   /api/                       → heliogram-backend (catch-all for Django REST)
#   /admin/                     → heliogram-backend (Django admin)
#   /static/                    → heliogram-backend (Django collectstatic)
#   /media/                     → heliogram-backend (user uploads)

# Shared proxy headers so upstream apps see the real client.
# These are included inline per-location to avoid requiring a separate file.

upstream heliogram_backend  { server heliogram-backend:8010; }
upstream heliogram_frontend { server heliogram-frontend:80; }
upstream main_app           { server main-app-frontend:80; }
upstream image_agent        { server image-generator-api:8020; }
upstream video_agent        { server video-generator-api:8030; }
upstream storyteller_agent  { server storyteller-api:8040; }
upstream campaign_agent     { server campaign-maker-api:8050; }

server {
  listen 80 default_server;
  server_name _;

  # Max upload size for media routes (Django MAX_UPLOAD_SIZE is 50MB).
  client_max_body_size 50M;

  # Keep-alive/read timeouts generous enough for LLM/image/video calls,
  # which routinely take 30–90s upstream.
  proxy_read_timeout 300s;
  proxy_send_timeout 300s;
  proxy_connect_timeout 30s;

  # ---- Server-Sent Events (must be first, more specific than /api/) ----
  # Django streams realtime events here; buffering MUST be disabled so the
  # client receives chunks as they are produced.
  location /api/realtime/events/ {
    proxy_pass http://heliogram_backend/api/realtime/events/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding off;
    proxy_read_timeout 24h;
  }

  # ---- AI agent microservices ----
  # Each location strips its prefix (/api/image/, /api/video/, ...) before
  # proxying, so the FastAPI apps see the plain /api/... routes they expose.

  location /api/image/ {
    rewrite ^/api/image/(.*)$ /api/$1 break;
    proxy_pass http://image_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/video/ {
    rewrite ^/api/video/(.*)$ /api/$1 break;
    proxy_pass http://video_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/campaign/ {
    rewrite ^/api/campaign/(.*)$ /api/$1 break;
    proxy_pass http://campaign_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/storyteller/ {
    rewrite ^/api/storyteller/(.*)$ /api/$1 break;
    proxy_pass http://storyteller_agent;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # ---- HelioGram backend (catch-all API + Django admin + static/media) ----
  location /api/ {
    proxy_pass http://heliogram_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /admin/ {
    proxy_pass http://heliogram_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /static/ {
    proxy_pass http://heliogram_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
  }

  location /media/ {
    proxy_pass http://heliogram_backend;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
  }

  # ---- HelioGram community SPA (served under /heliogram) ----
  # Strip the /heliogram prefix so the inner nginx serves index.html at '/'.
  location /heliogram/ {
    proxy_pass http://heliogram_frontend/heliogram/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
  # Redirect /heliogram (no trailing slash) to /heliogram/ for clean URLs.
  location = /heliogram {
    return 301 /heliogram/;
  }

  # ---- main-app SPA (default) ----
  location / {
    proxy_pass http://main_app;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
