# Edge nginx for helio-platform — production, TLS-terminating.
#
# Three server blocks:
#   1. :80 default_server — IP access + ACME challenge (kept on HTTP so a
#      user who types `http://103.174.102.124` still reaches the app, and
#      so certbot webroot renewals keep working without a reload).
#   2. :80 server_name api.helio.ae — 301 redirect to HTTPS.
#   3. :443 server_name api.helio.ae — TLS termination, full routing.
#
# The actual routing lives in `locations.inc` (kept in one place so the
# :80 and :443 servers always stay in sync).

upstream heliogram_backend  { server heliogram-backend:8010; }
upstream heliogram_frontend { server heliogram-frontend:80; }
upstream main_app           { server main-app-frontend:80; }
upstream image_agent        { server image-generator-api:8020; }
upstream video_agent        { server video-generator-api:8030; }
upstream storyteller_agent  { server storyteller-api:8040; }
upstream campaign_agent     { server campaign-maker-api:8050; }
upstream tenant_api         { server tenant-api:8060; }

# Defense-in-depth rate limit on the public /v1/* surface. Keyed by the
# real client IP (60 r/m, burst 30, nodelay so legitimate spikes don't
# queue). Each agent ALSO enforces a per-API-key bucket internally — this
# layer just stops scrapers before they reach FastAPI.
limit_req_zone $binary_remote_addr zone=helio_external:10m rate=60r/m;
limit_req_status 429;

# -------- Port 80, default server (IP access + ACME) --------
server {
  listen 80 default_server;
  server_name _;

  include /etc/nginx/snippets/locations.inc;
}

# -------- Port 80, canonical domain — redirect to HTTPS --------
# ACME challenges stay on HTTP (Let's Encrypt HTTP-01 requires it).
server {
  listen 80;
  server_name api.helio.ae;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
    default_type "text/plain";
    access_log off;
    try_files $uri =404;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# -------- Port 443, canonical domain — TLS --------
server {
  listen 443 ssl;
  http2 on;
  server_name api.helio.ae;

  # Certs are issued + renewed on the host by certbot, mounted into this
  # container read-only. See DEPLOY.md §6b.3 Path B.
  ssl_certificate     /etc/letsencrypt/live/api.helio.ae/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/api.helio.ae/privkey.pem;

  # Mozilla "intermediate" profile (as of 2026): TLS 1.2 + 1.3 only,
  # session resumption, no prefer_server_ciphers (TLS 1.3 handles it).
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 1d;
  ssl_session_tickets off;

  # HSTS: tell the browser to remember this host is HTTPS-only for a year.
  # `includeSubDomains` would also cover community.api.helio.ae etc.
  # if we ever add them; safe to leave on.
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  include /etc/nginx/snippets/locations.inc;
}
