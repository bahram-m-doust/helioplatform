server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # SPA history-API fallback: any path that doesn't match a built asset
  # falls back to index.html so React Router handles client-side routes.
  location / {
    try_files $uri /index.html;
  }

  # Long-cache hashed assets (vite emits content-hashed filenames).
  location ~* \.(js|css|woff2?|png|jpg|jpeg|svg|gif|ico)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # No-cache the index so a redeploy is picked up immediately.
  location = /index.html {
    add_header Cache-Control "no-store";
  }
}
