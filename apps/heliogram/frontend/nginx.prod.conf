# Inner nginx for the heliogram-frontend container.
# The edge nginx strips the /heliogram/ prefix before proxying here, so from
# this container's point of view the app lives at '/'. The built assets
# themselves, however, reference '/heliogram/...' (Vite `base`), so we serve
# them from BOTH '/' and '/heliogram/' to cover either proxy strategy.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Assets at /heliogram/assets/* — served directly from the same docroot
  # by stripping the prefix.
  location /heliogram/ {
    alias /usr/share/nginx/html/;
    try_files $uri $uri/ /index.html;
  }

  location /assets/ {
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
