# Inner nginx for the main-app container.
# The edge nginx handles routing to /heliogram, /api/*, /static, /media.
# This instance only serves the SPA static assets with history-API fallback.
server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Long cache for hashed assets (Vite emits content-hashed filenames).
  location /assets/ {
    access_log off;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
    try_files $uri =404;
  }

  # SPA fallback: unknown paths hand off to index.html so react-router works.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
