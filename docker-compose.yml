name: helio-platform

# Dev stack — agent backends only. Heliogram (Phase 6 extracted to its
# own repo) and Postgres (Supabase replaces it) are gone. Run with:
#   docker compose --env-file .env up -d

services:
  image-generator-api:
    build:
      context: .
      dockerfile: agents/image-generator/backend/Dockerfile
    container_name: helio-image-generator-api
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      SERVICE_NAME: image-generator
      PORT: "8020"
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4000}
    ports:
      - "${IMAGE_AGENT_PORT:-8020}:8020"

  video-generator-api:
    build:
      context: .
      dockerfile: agents/video-generator/backend/Dockerfile
    container_name: helio-video-generator-api
